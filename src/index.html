<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024, initial-scale=1.0">
<title>الأصيل — نظام إدارة الفندق</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Fraunces:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/extended.css">
</head>
<body>

  <!-- ===== Auth layer — first-run setup / login / recovery / forced reset.
       All states render INTO this single element; nothing here ever opens
       a second window. ===== -->
  <div id="authScreen" class="auth-screen"></div>

  <!-- ===== App layer — hidden until authenticated. Also lives in the same
       single window; sidebar navigation swaps #contentPane's content,
       it never stacks a new screen on top of another. ===== -->
  <div id="appShell" class="app-shell" hidden>

    <aside class="sidebar">
      <div class="sidebar-brand">
        <img id="sidebarLogo" class="sidebar-logo" src="../assets/logo/logo-white.png" alt="">
        <div class="sidebar-hotel-name" id="sidebarHotelName"></div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <button class="sidebar-logout" id="btnLogout">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        <span id="logoutLabel"></span>
      </button>
    </aside>

    <div class="main-col">
      <header class="topbar">
        <div class="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="searchInput" type="text">
        </div>
        <div class="top-right">
          <button class="theme-toggle-btn" id="themeToggle" title=""></button>
          <div class="clock"><span id="clockTime">--:--</span><span class="date" id="clockDate">—</span></div>
        </div>
      </header>

      <main class="content-pane" id="contentPane"></main>
    </div>
  </div>

  <div class="toast" id="toast">
    <span class="dot"></span>
    <span id="toastText"></span>
    <button class="toast-action" id="toastAction" hidden></button>
  </div>

  <!-- استدعاء ملفات المحاكاة (Mocking) للويب أولاً لتهيئة الـ API -->
  <script src="mock-main.js"></script>
  <script src="preload.js?v=3"></script>

  <!-- ملفات المشروع الأساسية -->
  <script src="js/i18n.js"></script>
  <script src="js/util.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/guests.js"></script>
  <script src="js/reservations.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/coffeeshop.js"></script>
  <script src="js/laundry.js"></script>
  <script src="js/maintenance.js"></script>
  <script src="js/hr.js"></script>
  <script src="js/accounting.js"></script>
  <script src="js/companies.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
